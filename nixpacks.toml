# Nixpacks build plan for Railway.
# Installs Python 3.11 + system libraries Playwright Chromium needs (the same
# ones `playwright install --with-deps chromium` would pull from apt on a
# Debian-based image). Chromium itself is downloaded in startup.sh on first
# boot so the slug stays small.

[phases.setup]
nixPkgs = [
    "python311",
    "python311Packages.pip",
    "gcc",
    "glib",
    "nss",
    "nspr",
    "atk",
    "at-spi2-atk",
    "at-spi2-core",
    "cups",
    "libdrm",
    "libxkbcommon",
    "libxcomposite",
    "libxdamage",
    "libxext",
    "libxfixes",
    "libxrandr",
    "mesa",
    "pango",
    "cairo",
    "alsa-lib",
    "dbus",
    "expat",
    "fontconfig",
    "freetype",
    "udev"
]

[phases.install]
cmds = [
    "python -m venv --copies /opt/venv",
    ". /opt/venv/bin/activate && pip install --upgrade pip && pip install -r requirements.txt",
    ". /opt/venv/bin/activate && python -m playwright install chromium"
]

[start]
cmd = "bash startup.sh"

[variables]
PYTHONUNBUFFERED = "1"
PYTHONDONTWRITEBYTECODE = "1"
PLAYWRIGHT_BROWSERS_PATH = "/root/.cache/ms-playwright"
PATH = "/opt/venv/bin:$PATH"
